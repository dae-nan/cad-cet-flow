<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAD CET Flow Prototype</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Credit Workspace</h1>
      <p id="breadcrumb" class="breadcrumb">Home</p>
    </div>
    <div class="actions" id="action-bar">
      <button id="save-btn" class="btn secondary">Save Draft</button>
      <button id="validate-btn" class="btn secondary">Validate</button>
      <button id="submit-btn" class="btn primary" disabled>Submit</button>
    </div>
  </header>

  <section class="control-strip">
    <div class="search-wrap">
      <label for="global-search">Search</label>
      <input id="global-search" type="text" placeholder="CAD/CET/Sandbox ID / Name, country, owner" />
      <button id="search-reset" class="btn secondary small">Reset</button>
    </div>
    <div class="filter-wrap">
      <label><input id="my-docs-toggle" type="checkbox" /> My Docs</label>
      <select id="filter-product"><option value="">Product</option></select>
      <select id="filter-segment"><option value="">Client Segment</option></select>
      <select id="filter-cluster"><option value="">Cluster</option></select>
      <select id="filter-country"><option value="">Country</option></select>
      <select id="filter-status"><option value="">Status</option><option>Active</option><option>In Flight</option><option>Completed</option></select>
    </div>
  </section>

  <main id="app-shell" class="app-shell">
    <aside class="left-panel" id="left-panel"></aside>
    <section class="center-panel" id="view-root"></section>

    <aside id="issue-panel" class="issue-panel" aria-live="polite">
      <div class="issue-header">
        <div>
          <h2>Issues</h2>
          <p id="issue-summary" class="muted">No issues</p>
        </div>
        <button id="close-panel" class="icon-btn" aria-label="Close">x</button>
      </div>
      <div class="filters">
        <button data-filter="all" class="filter active">All</button>
        <button data-filter="blockers" class="filter">Blockers</button>
        <button data-filter="errors" class="filter">Errors</button>
        <button data-filter="warnings" class="filter">Warnings</button>
      </div>
      <div id="resolved-banner" class="resolved-banner">All issues resolved</div>
      <ul id="issue-list" class="issue-list"></ul>
    </aside>
  </main>

  <div id="drawer-backdrop" class="drawer-backdrop"></div>
  <script src="app.js" type="module"></script>
</body>
</html>
