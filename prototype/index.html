<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAD CET Flow Prototype</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Credit Workspace</h1>
      <p id="breadcrumb" class="breadcrumb">Credit Approvals</p>
    </div>
    <div class="actions" id="action-bar">
      <button id="save-btn" class="btn secondary">Save Draft</button>
      <button id="validate-btn" class="btn secondary">Validate</button>
      <button id="submit-btn" class="btn primary" disabled>Submit</button>
    </div>
  </header>

  <main id="app-shell" class="app-shell">
    <aside class="left-panel" id="left-panel"></aside>
    <section class="center-panel" id="view-root"></section>

    <aside id="issue-panel" class="issue-panel" aria-live="polite">
      <div class="issue-header">
        <div>
          <h2>Issues</h2>
          <p id="issue-summary" class="muted">No issues</p>
        </div>
        <button id="close-panel" class="icon-btn" aria-label="Close">x</button>
      </div>
      <div class="filters">
        <button data-filter="all" class="filter active">All</button>
        <button data-filter="blockers" class="filter">Blockers</button>
        <button data-filter="errors" class="filter">Errors</button>
        <button data-filter="warnings" class="filter">Warnings</button>
      </div>
      <div id="resolved-banner" class="resolved-banner">All issues resolved</div>
      <ul id="issue-list" class="issue-list"></ul>
    </aside>
    <button id="open-panel-btn" class="open-panel-btn" aria-label="Open issues panel">Issues</button>
  </main>

  <div class="fab-group" aria-label="Quick actions">
    <div class="fab-help-wrap">
      <div id="help-float-menu" class="fab-menu" aria-hidden="true">
        <button class="fab-menu-item" data-help-type="docs" title="Documentation">Documentation</button>
        <button class="fab-menu-item coming-soon" data-help-type="approver" title="Find your approver">Find Your Approver</button>
        <button class="fab-menu-item coming-soon" data-help-type="demo" title="Demo mode">Demo Mode</button>
        <button class="fab-menu-item coming-soon" data-help-type="chat" title="Contact Credit chat">Contact Credit Chat</button>
      </div>
      <button id="help-fab" class="fab secondary" title="Help">?</button>
    </div>
    <div class="fab-create-wrap">
      <div id="create-float-menu" class="fab-menu" aria-hidden="true">
        <button class="fab-menu-item coming-soon" data-create-type="group" title="Create Group CAD">Group CAD</button>
        <button class="fab-menu-item coming-soon" data-create-type="country" title="Create Country CAD">Country CAD</button>
        <button class="fab-menu-item" data-create-type="cet" title="Create CET">CET</button>
        <button class="fab-menu-item coming-soon" data-create-type="sandbox" title="Create Sandbox">Sandbox</button>
      </div>
      <button id="create-fab" class="fab primary" title="Create">+</button>
    </div>
    <button id="backtop-fab" class="fab tertiary" title="Back to top" aria-label="Back to top">↑</button>
  </div>

  <div id="drawer-backdrop" class="drawer-backdrop"></div>
  <aside id="create-cet-drawer" class="side-drawer" aria-hidden="true"></aside>
  <div id="governance-modal" class="modal-shell" aria-hidden="true"></div>
  <script src="data/sample-hierarchy.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
