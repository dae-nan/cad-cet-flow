<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenSpec Markdown Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --text: #122032;
      --muted: #526173;
      --line: #dbe3ee;
      --link: #0b5ed7;
      --code-bg: #f1f5fb;
      --accent: #d8e5ff;
      --error: #b42318;
    }
    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #edf4ff, var(--bg) 40%);
      color: var(--text);
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    .head {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .actions a {
      color: var(--link);
      text-decoration: none;
      margin-right: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    .actions a:hover {
      text-decoration: underline;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
    }
    .error {
      color: var(--error);
      white-space: pre-wrap;
    }
    .markdown h1, .markdown h2, .markdown h3, .markdown h4 {
      margin-top: 26px;
      margin-bottom: 10px;
      line-height: 1.25;
    }
    .markdown h1 { font-size: 30px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
    .markdown h2 { font-size: 24px; border-bottom: 1px solid var(--line); padding-bottom: 6px; }
    .markdown h3 { font-size: 20px; }
    .markdown h4 { font-size: 17px; }
    .markdown p, .markdown li {
      line-height: 1.65;
      font-size: 15px;
    }
    .markdown ul, .markdown ol {
      padding-left: 24px;
    }
    .markdown code {
      background: var(--code-bg);
      border: 1px solid var(--accent);
      border-radius: 5px;
      padding: 1px 5px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    .markdown pre {
      background: var(--code-bg);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 12px;
      overflow: auto;
    }
    .markdown pre code {
      border: 0;
      background: transparent;
      padding: 0;
      font-size: 13px;
    }
    .markdown blockquote {
      margin: 12px 0;
      border-left: 4px solid var(--accent);
      padding: 4px 12px;
      color: var(--muted);
      background: #f8fbff;
    }
    .markdown table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 14px;
    }
    .markdown th, .markdown td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    .markdown th {
      background: #f2f6fc;
      font-weight: 700;
    }
    .markdown a {
      color: var(--link);
      text-decoration: none;
    }
    .markdown a:hover {
      text-decoration: underline;
    }
    .muted {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <div class="head">
      <div>
        <h1 style="margin:0;font-size:24px;">OpenSpec Markdown Viewer</h1>
        <div id="doc-path" class="meta"></div>
      </div>
      <div class="actions">
        <a href="index.html">Back to Index</a>
        <a id="raw-link" href="#" target="_blank" rel="noopener noreferrer">Open Raw Markdown</a>
      </div>
    </div>
    <div id="content" class="panel">
      <p class="muted">Loading markdown...</p>
    </div>
  </main>
  <script>
    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function safeDocPath(raw) {
      if (!raw) return { ok: false, reason: "Missing ?doc= query parameter." };
      let decoded = "";
      try {
        decoded = decodeURIComponent(raw);
      } catch (_e) {
        return { ok: false, reason: "Could not decode ?doc value." };
      }
      if (decoded.startsWith("/") || /^[A-Za-z]:/.test(decoded)) {
        return { ok: false, reason: "Absolute paths are not allowed." };
      }
      const normalized = decoded.replace(/\\/g, "/").replace(/^\.\/+/, "");
      if (!normalized.startsWith("changes/")) {
        return { ok: false, reason: "Only files under changes/ are allowed." };
      }
      if (!normalized.endsWith(".md")) {
        return { ok: false, reason: "Only markdown files are allowed." };
      }
      const parts = normalized.split("/");
      if (parts.some((part) => part === ".." || part === "")) {
        return { ok: false, reason: "Invalid path segments in ?doc value." };
      }
      return { ok: true, path: normalized };
    }

    function applyInline(text) {
      let out = text;
      out = out.replace(/`([^`]+)`/g, (_m, c) => `<code>${c}</code>`);
      out = out.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      out = out.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      return out;
    }

    function renderMarkdown(md) {
      const codeBlocks = [];
      let source = md.replace(/\r\n?/g, "\n");

      source = source.replace(/```([^\n]*)\n([\s\S]*?)```/g, (_m, lang, code) => {
        const token = `@@CODE_${codeBlocks.length}@@`;
        codeBlocks.push(`<pre><code class="lang-${escapeHtml(lang.trim())}">${escapeHtml(code)}</code></pre>`);
        return token;
      });

      source = escapeHtml(source);
      source = source.replace(/^(\|.+\|)\n(\|[-:| ]+\|)\n((?:\|.*\|\n?)*)/gm, (_m, head, _sep, body) => {
        const headCells = head.split("|").slice(1, -1).map((c) => `<th>${applyInline(c.trim())}</th>`).join("");
        const rows = body
          .trim()
          .split("\n")
          .filter(Boolean)
          .map((line) => {
            const cells = line.split("|").slice(1, -1).map((c) => `<td>${applyInline(c.trim())}</td>`).join("");
            return `<tr>${cells}</tr>`;
          }).join("");
        return `<table><thead><tr>${headCells}</tr></thead><tbody>${rows}</tbody></table>`;
      });

      source = source.replace(/^####\s+(.+)$/gm, "<h4>$1</h4>");
      source = source.replace(/^###\s+(.+)$/gm, "<h3>$1</h3>");
      source = source.replace(/^##\s+(.+)$/gm, "<h2>$1</h2>");
      source = source.replace(/^#\s+(.+)$/gm, "<h1>$1</h1>");
      source = source.replace(/^&gt;\s?(.*)$/gm, "<blockquote>$1</blockquote>");

      source = source.replace(/^(?:-|\*)\s+(.+)$/gm, "<li>$1</li>");
      source = source.replace(/(<li>[\s\S]*?<\/li>)/g, "<ul>$1</ul>");
      source = source.replace(/<\/ul>\s*<ul>/g, "");

      source = source.replace(/^(?:\d+)\.\s+(.+)$/gm, "<li data-ol='1'>$1</li>");
      source = source.replace(/(<li data-ol='1'>[\s\S]*?<\/li>)/g, (m) => `<ol>${m.replace(/ data-ol='1'/g, "")}</ol>`);
      source = source.replace(/<\/ol>\s*<ol>/g, "");

      source = source
        .split(/\n{2,}/)
        .map((chunk) => {
          const trimmed = chunk.trim();
          if (!trimmed) return "";
          if (/^<(h\d|ul|ol|pre|table|blockquote)/.test(trimmed)) return trimmed;
          return `<p>${trimmed.replace(/\n/g, "<br/>")}</p>`;
        })
        .join("\n");

      source = applyInline(source);

      for (let i = 0; i < codeBlocks.length; i += 1) {
        source = source.replace(`@@CODE_${i}@@`, codeBlocks[i]);
      }
      return source;
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("doc");
      const verdict = safeDocPath(raw);
      const content = document.getElementById("content");
      const pathLabel = document.getElementById("doc-path");
      const rawLink = document.getElementById("raw-link");

      if (!verdict.ok) {
        pathLabel.textContent = "Invalid document path";
        content.innerHTML = `<p class="error">${escapeHtml(verdict.reason)}</p>`;
        rawLink.removeAttribute("href");
        rawLink.style.pointerEvents = "none";
        rawLink.style.opacity = "0.5";
        return;
      }

      const docPath = verdict.path;
      pathLabel.textContent = `Document: ${docPath}`;
      rawLink.href = docPath;

      try {
        const resp = await fetch(docPath, { cache: "no-store" });
        if (!resp.ok) {
          content.innerHTML = `<p class="error">Failed to load markdown (${resp.status}).</p>`;
          return;
        }
        const markdown = await resp.text();
        content.innerHTML = `<article class="markdown">${renderMarkdown(markdown)}</article>`;
      } catch (err) {
        content.innerHTML = `<p class="error">Could not fetch markdown.\n${escapeHtml(String(err))}</p>`;
      }
    }

    init();
  </script>
</body>
</html>
